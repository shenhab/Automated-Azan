{{template "base.html" .}}
{{define "title"}}Logs - Automated Azan{{end}}
{{define "content"}}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2><i class="fas fa-file-alt islamic-icon me-2"></i>Logs</h2>
  <button class="btn btn-outline-secondary" onclick="location.reload()">
    <i class="fas fa-sync-alt"></i> Refresh
  </button>
</div>

<div class="card">
  <div class="card-body p-0">
    <pre class="bg-dark text-light p-3 mb-0 rounded" style="max-height:70vh;overflow-y:auto;font-size:.8rem;">{{.logs}}</pre>
  </div>
</div>
{{end}}
{{define "scripts"}}
<script>
// Auto-scroll to bottom
const pre = document.querySelector("pre");
if (pre) pre.scrollTop = pre.scrollHeight;
</script>
{{end}}
