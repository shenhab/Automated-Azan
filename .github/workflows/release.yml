name: Release

on:
  push:
    tags:
      - "v*"          # triggers on any tag like v1.0.0, v1.2.3-go, etc.
  workflow_dispatch:  # allow manual trigger from GitHub UI

permissions:
  contents: write   # needed to create/upload releases

jobs:
  # ── Build matrix: each OS builds its own native binary (CGO = real tray) ──
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux amd64 ───────────────────────────────────────────────────
          - runner:  ubuntu-latest
            goos:    linux
            goarch:  amd64
            cgo:     "1"
            asset:   azan-agent-linux-amd64

          # ── Linux arm64 (Raspberry Pi 4/5) ───────────────────────────────
          - runner:  ubuntu-latest
            goos:    linux
            goarch:  arm64
            cgo:     "0"          # cross-compile; GTK not available for ARM on ubuntu runner
            asset:   azan-agent-linux-arm64

          # ── Linux arm (Raspberry Pi 3) ────────────────────────────────────
          - runner:  ubuntu-latest
            goos:    linux
            goarch:  arm
            cgo:     "0"
            asset:   azan-agent-linux-arm

          # ── Windows amd64 ─────────────────────────────────────────────────
          - runner:  windows-latest
            goos:    windows
            goarch:  amd64
            cgo:     "1"          # Win32 tray is pure-Go but CGO=1 is safe on Windows
            asset:   azan-agent-windows-amd64.exe

          # ── macOS Intel (cross-compiled from Apple Silicon runner) ──────────
          # macos-13 Intel runners are scarce and slow to pick up jobs.
          # macOS Xcode SDK supports both architectures, so CGO cross-compile
          # works fine from an M-series runner.
          - runner:  macos-latest
            goos:    darwin
            goarch:  amd64
            cgo:     "1"
            asset:   azan-agent-darwin-amd64

          # ── macOS Apple Silicon ───────────────────────────────────────────
          - runner:  macos-latest
            goos:    darwin
            goarch:  arm64
            cgo:     "1"
            asset:   azan-agent-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod   # always matches what go.mod requires
          cache: true
          cache-dependency-path: go/go.sum

      # Linux only: install GTK3 + AppIndicator (tray) + ALSA (local audio via oto)
      - name: Install tray dependencies (Linux)
        if: matrix.goos == 'linux' && matrix.cgo == '1'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y pkg-config libgtk-3-dev libayatana-appindicator3-dev libasound2-dev

      - name: Build
        working-directory: go
        shell: bash   # force bash on all runners (Git Bash on Windows) so the conditional works
        env:
          GOOS:        ${{ matrix.goos }}
          GOARCH:      ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        # -H windowsgui suppresses the console window on Windows so only the
        # system tray icon appears when the .exe is launched.
        run: |
          EXTRA=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXTRA="-H windowsgui"; fi
          go build -ldflags="-s -w $EXTRA" -o ${{ matrix.asset }} ./cmd/azan-agent

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: go/${{ matrix.asset }}
          retention-days: 1

  # ── Create GitHub Release and attach all binaries ─────────────────────────
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Restore executable permissions
        # upload/download-artifact uses zip which strips Unix file mode.
        # chmod every non-Windows binary so users can run them directly.
        run: |
          chmod +x dist/azan-agent-linux-* dist/azan-agent-darwin-* 2>/dev/null || true
          ls -lh dist/

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name:   ${{ github.ref_name }}
          name:       "Automated Azan ${{ github.ref_name }}"
          body: |
            ## Automated Azan — ${{ github.ref_name }}

            Cross-platform Go agent. Single binary, no runtime required.

            ### What's new in v1.1.0

            **Background service on all platforms**
            - On first launch the agent automatically installs itself as a native background service (systemd user service on Linux, LaunchAgent on macOS, Windows Service on Windows) and starts it — no manual `install` step required
            - The tray icon now has an **Exit** option that fully stops the service
            - Windows: launches without a console window (`-H windowsgui`); shows a clear message if admin rights are needed to register the service

            **Three notification channels — per prayer**
            - Each of the 5 prayers, Pre-Fajr Quran, and Friday Al-Kahf independently supports: **Google/Chromecast speaker**, **local desktop audio**, and **OS desktop notification** (toast)
            - Mix and match per prayer — e.g. speaker + notification for Fajr, local audio only for Dhuhr
            - Local audio: macOS uses `afplay` (built-in); Linux tries `mpg123` → `ffplay` → `cvlc`; Windows uses PowerShell WMF MediaPlayer (built-in)

            **Quran streaming from the tray**
            - Tray menu shows **▶ Quran on Speaker** and **▶ Quran on This PC**
            - Click to start; title changes to **■ Stop Quran on …** while streaming
            - Click again (or use any other stop path) to end the stream
            - State syncs every 30 seconds so the label always reflects reality

            **Scheduler sorted by time**
            - The Scheduler page now lists all jobs in chronological order (Pre-Fajr Quran correctly appears before Fajr Athan)

            ---

            ### Downloads

            | File | Platform | Tray |
            |---|---|---|
            | `azan-agent-linux-amd64` | Linux x86-64 | ✅ native GTK |
            | `azan-agent-linux-arm64` | Raspberry Pi 4/5 | — headless |
            | `azan-agent-linux-arm` | Raspberry Pi 3 | — headless |
            | `azan-agent-windows-amd64.exe` | Windows 64-bit | ✅ native Win32 |
            | `azan-agent-darwin-amd64` | macOS Intel | ✅ native NSStatusBar |
            | `azan-agent-darwin-arm64` | macOS Apple Silicon (M1/M2/M3) | ✅ native NSStatusBar |

            ### Quick start
            1. Download the binary for your platform
            2. Run it — it installs itself as a background service automatically
            3. Dashboard: `http://localhost:28426`

            ### macOS — first run only (Gatekeeper)
            ```bash
            xattr -rd com.apple.quarantine azan-agent-darwin-arm64
            ./azan-agent-darwin-arm64
            ```

            ### Windows — first run (service registration)
            Right-click → **Run as administrator** once to register the Windows Service.
            All subsequent launches work without elevation.
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
